##### Prefix / basics
set -g prefix C-a
unbind C-b
unbind C-a
bind C-a send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

# shell / terminal
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

# reload config
bind R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

##### Copy mode (macOS clipboard)
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

##### Prompts / layouts
bind : command-prompt
bind + select-layout main-horizontal
bind = select-layout main-vertical
set -g other-pane-height 25
set -g other-pane-width 80

##### Windows
bind c new-window -c "$HOME"
bind t next-window
bind T previous-window

# global window navigation
bind -n C-n next-window
bind -n C-p previous-window
bind -n C-b previous-window

##### Splits (keep cwd)
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

##### Panes
bind a last-pane
bind q display-panes
set -g display-panes-time 1500

# Clear screen + tmux history
bind -n C-u send-keys C-l \; clear-history

# move cursor by word (depends on iTerm2 mapping)
bind -n C-Left send-keys M-b
bind -n C-Right send-keys M-f

##### Activity notifications
setw -g monitor-activity on
set -g visual-activity on

##### Repeat timing
set -g repeat-time 300

##### Status bar
set -g status-interval 1
set -g status-left ''
set -g status-right ''
set -g window-status-format " #I: #W #F"
set -g window-status-current-format " #I: #W #F"
set -g window-status-current-style "fg=white bg=black"
set -g status-style "fg=black bg=colour245"

##### Plugins
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
set -g @continuum-save-interval '10'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# TPM (must be last)
run '~/.tmux/plugins/tpm/tpm'
